<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digit Span Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d1a;
      --panel:   #13132b;
      --accent:  #5e81f4;
      --accent2: #f45e81;
      --text:    #e8e8f0;
      --muted:   #6b6b90;
      --success: #4ade80;
      --fail:    #f45e81;
      --pink:    #f4a45e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .btn {
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .06em;
      transition: transform .1s, opacity .15s;
    }
    .btn:active { transform: scale(.95); }
    .btn:disabled { opacity: .4; cursor: default; }
    .copyright {
      margin-top: 2rem;
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .04em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.2rem;
      padding: .9rem 3.5rem;
      box-shadow: 0 8px 32px rgba(94,129,244,.35);
    }

    /* ══════════════════════════════
       언어 선택
    ══════════════════════════════ */
    .lang-switcher {
      display: flex;
      gap: .4rem;
      justify-content: flex-end;
      margin-bottom: 1.2rem;
    }
    .lang-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 50px;
      color: var(--text);
      font-size: .8rem;
      font-weight: 700;
      padding: .3rem .9rem;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .06em;
    }
    .lang-btn:hover { background: rgba(255,255,255,.14); }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 3px 12px rgba(94,129,244,.4);
    }

    /* ══════════════════════════════
       연구 안내 카드
    ══════════════════════════════ */
    .research-info {
      background: rgba(94,129,244,.06);
      border: 1px solid rgba(94,129,244,.18);
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.4rem;
      text-align: left;
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .research-info p { margin-bottom: .7rem; }
    .research-info p:last-child { margin-bottom: 0; }
    .research-info .info-highlight {
      color: var(--text);
      font-weight: 600;
    }

    /* ══════════════════════════════
       시작 / 참가자 입력 화면
    ══════════════════════════════ */
    #screen-start {
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn .5s ease;
    }
    #screen-start h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: .12em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .4rem;
    }
    #screen-start .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 1.2rem;
    }
    .participant-count {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(94,129,244,.08);
      border: 1px solid rgba(94,129,244,.2);
      border-radius: 50px;
      padding: .35rem 1.1rem;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 2rem;
      min-height: 1.8rem;
    }
    .participant-count .count-num {
      font-size: 1rem;
      font-weight: 900;
      color: var(--accent);
    }

    .form-card {
      background: var(--panel);
      border: 1px solid rgba(94,129,244,.18);
      border-radius: 20px;
      padding: 1.8rem;
      margin-bottom: 1.6rem;
      text-align: left;
    }
    .field { margin-bottom: 1.3rem; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }
    .field input[type="text"],
    .field input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(94,129,244,.25);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: .6rem 1rem;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    /* 성별 라디오 */
    .gender-row { display: flex; gap: .5rem; }
    .gender-row input[type="radio"] { display: none; }
    .gender-row label {
      flex: 1;
      text-align: center;
      padding: .5rem .2rem;
      border-radius: 10px;
      border: 1px solid rgba(94,129,244,.25);
      cursor: pointer;
      font-size: .92rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .15s;
    }
    .gender-row input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(94,129,244,.3);
    }

    /* ══════════════════════════════
       게임 화면
    ══════════════════════════════ */
    #screen-game {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      animation: fadeIn .4s ease;
    }

    #history-bar {
      display: flex;
      gap: .45rem;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 26px;
    }
    .hist-chip {
      font-size: .72rem;
      font-weight: 700;
      padding: .18rem .65rem;
      border-radius: 50px;
      letter-spacing: .05em;
    }
    .hist-chip.ok { background: rgba(74,222,128,.15); color: var(--success); border: 1px solid rgba(74,222,128,.3); }
    .hist-chip.ng { background: rgba(244,94,129,.15); color: var(--fail);    border: 1px solid rgba(244,94,129,.3); }

    #level-badge {
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(94,129,244,.1);
      border: 1px solid rgba(94,129,244,.28);
      border-radius: 50px;
      padding: .35rem 1.3rem;
    }

    #digit-card {
      width: clamp(150px, 26vw, 210px);
      height: clamp(195px, 34vw, 270px);
      background: var(--panel);
      border-radius: 22px;
      border: 2px solid rgba(94,129,244,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(5rem, 13vw, 8.5rem);
      font-weight: 900;
      color: var(--text);
      box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
      transition: border-color .12s, box-shadow .12s, background .12s;
      user-select: none;
    }
    #digit-card.show {
      border-color: var(--accent);
      box-shadow: 0 20px 60px rgba(94,129,244,.32), inset 0 1px 0 rgba(255,255,255,.08);
      background: linear-gradient(160deg, #1a1a3a, #13132b);
    }
    #digit-card.blank { border-color: rgba(94,129,244,.07); }
    #digit-card.auditory {
      border-color: var(--accent2);
      box-shadow: 0 20px 60px rgba(244,94,129,.32), inset 0 1px 0 rgba(255,255,255,.08);
      background: linear-gradient(160deg, #2a1a2a, #1e132b);
      font-size: clamp(3.5rem, 9vw, 5.5rem);
      animation: pulse-aud .6s ease-in-out infinite alternate;
    }
    @keyframes pulse-aud {
      from { box-shadow: 0 20px 60px rgba(244,94,129,.18); }
      to   { box-shadow: 0 20px 60px rgba(244,94,129,.55); }
    }

    #status-msg {
      font-size: .92rem;
      color: var(--muted);
      letter-spacing: .05em;
      min-height: 1.4rem;
      text-align: center;
    }
    #status-msg.ok   { color: var(--success); font-weight: 700; font-size: 1.05rem; }
    #status-msg.fail { color: var(--fail);    font-weight: 700; font-size: 1.05rem; }

    /* 입력 칸 */
    #input-area {
      display: flex;
      gap: .55rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .digit-input {
      width: clamp(42px, 8.5vw, 56px);
      height: clamp(54px, 10.5vw, 70px);
      border-radius: 12px;
      border: 2px solid rgba(94,129,244,.28);
      background: var(--panel);
      color: var(--text);
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 900;
      text-align: center;
      caret-color: transparent;
      outline: none;
      transition: border-color .12s, box-shadow .12s, background .12s;
    }
    .digit-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(94,129,244,.2); }
    .digit-input.correct { border-color: var(--success); background: rgba(74,222,128,.1); color: var(--success); }
    .digit-input.wrong   { border-color: var(--fail);    background: rgba(244,94,129,.1); color: var(--fail); }
    .btn-confirm {
      font-size: 1.1rem;
      padding: .8rem 3rem;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 24px rgba(94,129,244,.35);
      transition: opacity .2s, transform .1s;
    }
    .btn-confirm:disabled {
      opacity: .25;
      cursor: default;
      box-shadow: none;
    }

    /* ══════════════════════════════
       결과 화면
    ══════════════════════════════ */
    #screen-result {
      text-align: center;
      width: 100%;
      max-width: 480px;
      animation: fadeIn .5s ease;
    }
    #screen-result h2 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      letter-spacing: .1em;
      margin-bottom: .2rem;
    }
    .goodbye {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: .06em;
      margin-bottom: 1.4rem;
    }
    .result-meta {
      display: flex;
      justify-content: center;
      gap: .8rem;
      flex-wrap: wrap;
      margin-bottom: 1.6rem;
    }
    .meta-chip {
      font-size: .78rem;
      font-weight: 700;
      padding: .28rem .9rem;
      border-radius: 50px;
      letter-spacing: .06em;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--muted);
    }

    .best-label { color: var(--muted); font-size: .82rem; margin-bottom: .2rem; }
    .best-value {
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.8rem;
    }

    #result-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.8rem;
      font-size: .88rem;
    }
    #result-table th {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .35rem .6rem;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    #result-table td {
      padding: .45rem .6rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    #result-table td.ok { color: var(--success); font-weight: 700; }
    #result-table td.ng { color: var(--fail);    font-weight: 700; }

    .save-status {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 1.2rem;
      min-height: 1.1rem;
    }
    .save-status.saved { color: var(--success); }
    .save-status.error { color: var(--fail); }
    .retry-prompt {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: .9rem;
      letter-spacing: .04em;
    }
    .retry-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-retry {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.1rem;
      padding: .8rem 2.5rem;
      box-shadow: 0 6px 24px rgba(94,129,244,.35);
    }
    .btn-newuser {
      background: rgba(255,255,255,.07);
      color: var(--muted);
      font-size: 1rem;
      padding: .8rem 2rem;
      border: 1px solid rgba(255,255,255,.1);
    }

    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ══ 시작 / 참가자 정보 입력 화면 ══ -->
<div id="screen-start">
  <div class="lang-switcher">
    <button class="lang-btn active" id="lang-ko">한국어</button>
    <button class="lang-btn"        id="lang-en">English</button>
    <button class="lang-btn"        id="lang-zh">中文</button>
  </div>

  <h1>DIGIT SPAN TEST</h1>
  <p class="subtitle" id="txt-subtitle"></p>
  <div class="research-info" id="txt-research-info"></div>
  <div id="participant-count" class="participant-count"></div>

  <div class="form-card">
    <div class="field">
      <label id="lbl-name"></label>
      <input type="text" id="inp-name" autocomplete="off" />
    </div>
    <div class="field">
      <label id="lbl-gender"></label>
      <div class="gender-row">
        <input type="radio" name="gender" id="g-male"   value="남성" />
        <label for="g-male"   id="lbl-g-male"></label>
        <input type="radio" name="gender" id="g-female" value="여성" />
        <label for="g-female" id="lbl-g-female"></label>
        <input type="radio" name="gender" id="g-other"  value="기타" />
        <label for="g-other"  id="lbl-g-other"></label>
      </div>
    </div>
    <div class="field">
      <label id="lbl-age"></label>
      <input type="number" id="inp-age" min="1" max="120" autocomplete="off" />
    </div>
  </div>

  <button class="btn btn-primary" id="btn-start">START</button>
  <p class="copyright">© 2026 Tae Kim &amp; Seungyeong Yu.<br>All rights reserved.</p>
</div>

<!-- ══ 게임 화면 ══ -->
<div id="screen-game" class="hidden">
  <div id="history-bar"></div>
  <div id="level-badge">3-DIGIT SPAN</div>
  <div id="digit-card" class="blank"></div>
  <div id="status-msg"></div>
  <div id="input-area" class="hidden"></div>
  <button id="btn-confirm" class="btn btn-confirm hidden" disabled></button>
</div>

<!-- ══ 결과 화면 ══ -->
<div id="screen-result" class="hidden">
  <h2>GAME OVER</h2>
  <p class="goodbye" id="txt-goodbye"></p>

  <div class="result-meta">
    <span class="meta-chip" id="res-name"></span>
  </div>

  <div class="best-label" id="txt-best-label"></div>
  <div class="best-value" id="result-best">–</div>

  <table id="result-table">
    <thead>
      <tr>
        <th id="th-level"></th>
        <th id="th-result"></th>
        <th id="th-entered"></th>
        <th id="th-answer"></th>
      </tr>
    </thead>
    <tbody id="result-tbody"></tbody>
  </table>

  <p class="save-status" id="save-status"></p>
  <p class="retry-prompt" id="txt-retry-prompt"></p>
  <div class="retry-buttons">
    <button class="btn btn-retry"   id="btn-retry"></button>
    <button class="btn btn-newuser" id="btn-restart"></button>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   번역 (i18n)
════════════════════════════════════════ */
const T = {
  ko: {
    subtitle:       '화면에 제시된 숫자를 순서대로 기억한 후 입력하세요.<br>숫자 3개로 시작해서, 1개씩 갯수가 늘어납니다.',
    researchInfo:   `<p>이 연구는 <span class="info-highlight">소리 자극의 종류에 따라 인지기능(작업기억)에 미치는 영향</span>을 알아보기 위한 것입니다.</p><p>숫자가 제시되는 동안 다양한 소리 자극이 함께 제공됩니다. <span class="info-highlight">스피커 또는 이어폰을 착용하고 수행해 주십시오.</span> 이어폰 사용 시 음량을 중간 수준으로 조절하시고, 불편하지 않은 범위 내에서 가능한 한 크게 설정하시는 것을 권장합니다.</p><p>수집된 정보(이름, 성별, 나이, 수행 결과)는 <span class="info-highlight">연구 목적으로만 사용</span>되며, 연구 이외의 목적으로는 활용되지 않습니다.</p>`,
    countLabel:     n => `누적 체험자 <span class="count-num">${n.toLocaleString()}</span> 명`,
    labelName:      '이름',      placeholderName:   '홍길동',
    labelGender:    '성별',
    gMale: '남성', gFemale: '여성', gOther: '기타',
    labelAge:       '나이',      placeholderAge:    '25',
    ready:          '준비…',
    inputPrompt:    '기억한 순서대로 입력하세요',
    correct:        '✓ 정답!',   wrong:             '✗ 오답',
    btnConfirm:     '확인',
    goodbye:        '수고하셨습니다',
    bestLabel:      '최고 달성',
    thLevel: '레벨', thResult: '결과', thEntered: '입력', thAnswer: '정답',
    saving:         '저장 중…',
    saved:          id => `✓ 결과 저장 완료 (세션 #${id})`,
    saveError:      '⚠ 저장 실패 (서버 미연결)',
    retryPrompt:    '재도전 하시겠습니까?',
    btnRetry:       '재도전',
    btnNewUser:     '새 참가자',
    alertName:      '이름을 입력해 주세요.',
    alertGender:    '성별을 선택해 주세요.',
    alertAge:       '나이를 올바르게 입력해 주세요.',
    resultOk:       '성공',      resultNg:          '실패',
    metaAge:        age => `${age}세`,
    metaAttempt:    n => n > 1 ? ` · ${n}차 시도` : '',
  },
  en: {
    subtitle:       'Watch the digits, then type them back.<br>Starts at 3 — one more after each success.',
    researchInfo:   `<p>This study investigates how <span class="info-highlight">different types of auditory stimuli affect cognitive function (working memory)</span>.</p><p>Auditory stimuli will play alongside the digit sequences. <span class="info-highlight">Please use speakers or earphones during the task.</span> If using earphones, set the volume to a moderate level — we recommend the highest volume that remains comfortable.</p><p>Information collected (name, gender, age, and performance) will be used <span class="info-highlight">solely for research purposes</span> and will not be shared or used otherwise.</p>`,
    countLabel:     n => `<span class="count-num">${n.toLocaleString()}</span> participants so far`,
    labelName:      'Name',      placeholderName:   'Jane Doe',
    labelGender:    'Gender',
    gMale: 'Male', gFemale: 'Female', gOther: 'Other',
    labelAge:       'Age',       placeholderAge:    '25',
    ready:          'Get ready…',
    inputPrompt:    'Enter the digits in order',
    correct:        '✓ Correct!', wrong:            '✗ Wrong',
    btnConfirm:     'Confirm',
    goodbye:        'Thank you for participating',
    bestLabel:      'Best Result',
    thLevel: 'Level', thResult: 'Result', thEntered: 'Entered', thAnswer: 'Answer',
    saving:         'Saving…',
    saved:          id => `✓ Saved (Session #${id})`,
    saveError:      '⚠ Save failed (server unavailable)',
    retryPrompt:    'Would you like to try again?',
    btnRetry:       'Try Again',
    btnNewUser:     'New Participant',
    alertName:      'Please enter your name.',
    alertGender:    'Please select your gender.',
    alertAge:       'Please enter a valid age.',
    resultOk:       'Pass',      resultNg:          'Fail',
    metaAge:        age => `${age} y/o`,
    metaAttempt:    n => n > 1 ? ` · Attempt ${n}` : '',
  },
  zh: {
    subtitle:       '记住数字，按顺序输入。<br>从3位开始，答对一次加一位。',
    researchInfo:   `<p>本研究旨在探讨<span class="info-highlight">不同类型听觉刺激对认知功能（工作记忆）的影响</span>。</p><p>数字呈现期间将同步播放听觉刺激，<span class="info-highlight">请使用扬声器或耳机参与测试。</span>使用耳机时请将音量调至适中，在不感到不适的前提下，建议尽量调高音量。</p><p>所收集的信息（姓名、性别、年龄及测试结果）<span class="info-highlight">仅用于研究目的</span>，不会用于任何其他用途。</p>`,

let lang = 'ko';

function applyLang() {
  const t = T[lang];
  document.documentElement.lang = lang;

  // 언어 버튼
  document.getElementById('lang-ko').classList.toggle('active', lang === 'ko');
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');

  // 시작 화면
  document.getElementById('txt-subtitle').innerHTML    = t.subtitle;
  document.getElementById('txt-research-info').innerHTML = t.researchInfo;
  document.getElementById('lbl-name').textContent   = t.labelName;
  document.getElementById('inp-name').placeholder   = t.placeholderName;
  document.getElementById('lbl-gender').textContent = t.labelGender;
  document.getElementById('lbl-g-male').textContent   = t.gMale;
  document.getElementById('lbl-g-female').textContent = t.gFemale;
  document.getElementById('lbl-g-other').textContent  = t.gOther;
  document.getElementById('lbl-age').textContent    = t.labelAge;
  document.getElementById('inp-age').placeholder    = t.placeholderAge;

  // 게임 화면
  document.getElementById('btn-confirm').textContent = t.btnConfirm;

  // 결과 화면
  document.getElementById('txt-goodbye').textContent     = t.goodbye;
  document.getElementById('txt-best-label').textContent  = t.bestLabel;
  document.getElementById('th-level').textContent        = t.thLevel;
  document.getElementById('th-result').textContent       = t.thResult;
  document.getElementById('th-entered').textContent      = t.thEntered;
  document.getElementById('th-answer').textContent       = t.thAnswer;
  document.getElementById('txt-retry-prompt').textContent = t.retryPrompt;
  document.getElementById('btn-retry').textContent       = t.btnRetry;
  document.getElementById('btn-restart').textContent     = t.btnNewUser;

  // 참가자 카운트 재적용 (이미 로드된 경우)
  if (_lastCount !== null) renderCount(_lastCount);
}

document.getElementById('lang-ko').addEventListener('click', () => { lang = 'ko'; applyLang(); });
document.getElementById('lang-en').addEventListener('click', () => { lang = 'en'; applyLang(); });
document.getElementById('lang-zh').addEventListener('click', () => { lang = 'zh'; applyLang(); });

/* ════════════════════════════════════════
   오디오 유틸 (파일 재생)
════════════════════════════════════════ */
const audioFiles = {
  '8hz':        new Audio('8Hz_T.mp3'),
  '40hz':       new Audio('40Hz_T.mp3'),
  'pink_noise': new Audio('pink_T.wav'),
};
Object.values(audioFiles).forEach(a => { a.preload = 'auto'; a.volume = 0.64; });

let _activeAudio   = null;
let _activeTimeout = null;

function playStimulus(durationSec) {
  if (_activeAudio) { _activeAudio.pause(); _activeAudio.currentTime = 0; }
  if (_activeTimeout) clearTimeout(_activeTimeout);

  const audio = audioFiles[condition];
  if (!audio) return;
  _activeAudio = audio;
  audio.currentTime = 0;
  audio.play().catch(e => console.warn('Audio play:', e));

  _activeTimeout = setTimeout(() => {
    audio.pause();
    audio.currentTime = 0;
    _activeAudio = null;
  }, durationSec * 1000);
}

/* ════════════════════════════════════════
   유틸
════════════════════════════════════════ */
const sleep = ms => new Promise(r => setTimeout(r, ms));

function randDigitSeq(len) {
  const digits = [1,2,3,4,5,6,7,8,9];
  const seq = [];
  for (let i = 0; i < len; i++) {
    let d;
    do { d = digits[Math.floor(Math.random() * digits.length)]; }
    while (d === seq[seq.length - 1]);
    seq.push(d);
  }
  return seq;
}

/* ════════════════════════════════════════
   DOM
════════════════════════════════════════ */
const $start      = document.getElementById('screen-start');
const $game       = document.getElementById('screen-game');
const $result     = document.getElementById('screen-result');
const $badge      = document.getElementById('level-badge');
const $card       = document.getElementById('digit-card');
const $status     = document.getElementById('status-msg');
const $inputArea  = document.getElementById('input-area');
const $btnConfirm = document.getElementById('btn-confirm');
const $histBar    = document.getElementById('history-bar');
const $resBest    = document.getElementById('result-best');
const $resTbody   = document.getElementById('result-tbody');
const $resName    = document.getElementById('res-name');
const $saveStatus = document.getElementById('save-status');

/* ════════════════════════════════════════
   게임 상태
════════════════════════════════════════ */
let participant   = { name: '', gender: '', age: 0 };
let condition     = '';   // '8hz' | '40hz' | 'pink_noise'
let presentation  = '';   // 'visual' | 'auditory'
let gameResults   = [];
let gameStartTime = 0;
let attemptNo     = 1;
let currentLevel  = 3;

/* ════════════════════════════════════════
   화면 전환
════════════════════════════════════════ */
function showScreen(el) {
  [$start, $game, $result].forEach(s => s.classList.add('hidden'));
  el.classList.remove('hidden');
}

/* ════════════════════════════════════════
   기록 바
════════════════════════════════════════ */
function refreshHistBar() {
  $histBar.innerHTML = gameResults.map(r =>
    `<span class="hist-chip ${r.success ? 'ok' : 'ng'}">${r.level}-D ${r.success ? '✓' : '✗'}</span>`
  ).join('');
}

/* ════════════════════════════════════════
   청각 제시: 숫자 TTS
════════════════════════════════════════ */
function speakDigit(digit) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(String(digit));
  utt.rate   = 0.85;
  utt.pitch  = 1;
  utt.volume = 1.0;  // Web Speech API 최대치
  speechSynthesis.speak(utt);
}

/* ════════════════════════════════════════
   시퀀스 재생
════════════════════════════════════════ */
async function playSequence(seq) {
  for (let i = 0; i < seq.length; i++) {
    if (presentation === 'auditory') {
      // ① 소리 자극 0.5초
      $card.textContent = '🔊';
      $card.className   = 'auditory';
      playStimulus(0.5);
      await sleep(500);

      // ② TTS 숫자 읽기 0.5초
      speakDigit(seq[i]);
      await sleep(500);
    } else {
      // 시각: 소리 자극 + 숫자 동시, 1초
      $card.textContent = seq[i];
      $card.className   = 'show';
      playStimulus(0.5);
      await sleep(1000);
    }

    // ③ pause 0.2초
    $card.textContent = '';
    $card.className   = 'blank';
    if (presentation === 'auditory') speechSynthesis.cancel();
    await sleep(200);
  }
}

/* ════════════════════════════════════════
   입력 대기 & 자동 판정
════════════════════════════════════════ */
function waitForInput(seq) {
  const n = seq.length;
  const t = T[lang];
  $inputArea.innerHTML = '';
  $inputArea.classList.remove('hidden');

  $btnConfirm.classList.remove('hidden');
  $btnConfirm.disabled = true;

  const inputs = Array.from({ length: n }, () => {
    const inp = document.createElement('input');
    inp.type      = 'text';
    inp.inputMode = 'numeric';
    inp.maxLength = 1;
    inp.className = 'digit-input';
    inp.setAttribute('autocomplete', 'off');
    $inputArea.appendChild(inp);
    return inp;
  });

  requestAnimationFrame(() => inputs[0].focus());

  return new Promise(resolve => {
    function lockAll() { inputs.forEach(i => { i.readOnly = true; i.blur(); }); }

    function updateConfirmBtn() {
      $btnConfirm.disabled = inputs.some(i => i.value === '');
    }

    function submit() {
      if (inputs.some(i => i.value === '')) return;
      lockAll();
      $btnConfirm.disabled = true;
      $btnConfirm.classList.add('hidden');
      const entered = inputs.map(i => parseInt(i.value, 10));
      const correct = seq.every((d, i) => d === entered[i]);
      inputs.forEach((inp, i) => inp.classList.add(seq[i] === entered[i] ? 'correct' : 'wrong'));
      $status.textContent = correct ? t.correct : t.wrong;
      $status.className   = correct ? 'ok' : 'fail';
      setTimeout(() => resolve({ correct, entered }), 900);
    }

    $btnConfirm.onclick = submit;

    inputs.forEach((inp, idx) => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace') {
          if (inp.value === '' && idx > 0) { inputs[idx-1].value = ''; inputs[idx-1].focus(); }
          else inp.value = '';
          e.preventDefault();
          updateConfirmBtn();
          return;
        }
        if (e.key === 'Enter') { submit(); return; }
        if (e.key.length === 1 && !/[0-9]/.test(e.key)) e.preventDefault();
      });
      inp.addEventListener('input', () => {
        inp.value = inp.value.replace(/[^0-9]/g, '').slice(-1);
        if (inp.value !== '' && idx < n - 1) inputs[idx + 1].focus();
        updateConfirmBtn();
      });
    });
  });
}

/* ════════════════════════════════════════
   레벨 실행
════════════════════════════════════════ */
async function runLevel(level) {
  const seq = randDigitSeq(level);
  const t   = T[lang];
  $badge.textContent  = `${level}-DIGIT SPAN`;
  $card.textContent   = '';
  $card.className     = 'blank';
  $status.textContent = t.ready;
  $status.className   = '';
  $inputArea.classList.add('hidden');
  $inputArea.innerHTML = '';
  $btnConfirm.classList.add('hidden');
  $btnConfirm.disabled = true;

  await sleep(1200);

  $status.textContent = '';
  await playSequence(seq);

  $status.textContent = t.inputPrompt;
  $status.className   = '';

  const { correct, entered } = await waitForInput(seq);
  gameResults.push({ level, success: correct, seq, entered });
  refreshHistBar();
  return correct;
}

/* ════════════════════════════════════════
   서버에 결과 저장
════════════════════════════════════════ */
async function saveToServer() {
  const t = T[lang];
  try {
    $saveStatus.textContent = t.saving;
    $saveStatus.className   = 'save-status';
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:         participant.name,
        gender:       participant.gender,
        age:          participant.age,
        condition,
        presentation,
        duration_sec: Math.round((Date.now() - gameStartTime) / 1000),
        attempt_no:   attemptNo,
        results:      gameResults
      })
    });
    if (res.ok) {
      const { id } = await res.json();
      $saveStatus.textContent = t.saved(id);
      $saveStatus.className   = 'save-status saved';
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    console.warn('Save failed:', e);
    $saveStatus.textContent = t.saveError;
    $saveStatus.className   = 'save-status error';
  }
}

/* ════════════════════════════════════════
   결과 화면
════════════════════════════════════════ */
async function showResult() {
  const t = T[lang];
  const successes = gameResults.filter(r => r.success);
  const best = successes.length > 0 ? Math.max(...successes.map(r => r.level)) : 0;

  $resBest.textContent = best > 0 ? `${best}-Digit` : '–';

  $resName.textContent =
    `${participant.name} · ${participant.gender} · ${t.metaAge(participant.age)}` +
    t.metaAttempt(attemptNo);

  $resTbody.innerHTML = gameResults.map(r => {
    const cls = r.success ? 'ok' : 'ng';
    const txt = r.success ? t.resultOk : t.resultNg;
    return `<tr>
      <td>${r.level}-Digit</td>
      <td class="${cls}">${txt}</td>
      <td>${r.entered.join(' ')}</td>
      <td style="color:var(--muted)">${r.seq.join(' ')}</td>
    </tr>`;
  }).join('');

  showScreen($result);
  await saveToServer();
}

/* ════════════════════════════════════════
   게임 루프
════════════════════════════════════════ */
async function runGame() {
  gameResults   = [];
  currentLevel  = 3;
  gameStartTime = Date.now();
  $histBar.innerHTML = '';
  showScreen($game);

  while (true) {
    const ok = await runLevel(currentLevel);
    if (!ok) break;
    currentLevel++;
  }

  await sleep(400);
  await showResult();
}

/* ════════════════════════════════════════
   참가자 카운트
════════════════════════════════════════ */
let _lastCount = null;

function renderCount(n) {
  _lastCount = n;
  document.getElementById('participant-count').innerHTML = T[lang].countLabel(n);
}

async function loadParticipantCount() {
  try {
    const res = await fetch('/api/count');
    const { count } = await res.json();
    renderCount(count);
  } catch (_) {
    document.getElementById('participant-count').innerHTML = '';
  }
}

/* ════════════════════════════════════════
   이벤트 핸들러
════════════════════════════════════════ */
document.getElementById('btn-start').addEventListener('click', () => {
  const t      = T[lang];
  const name   = document.getElementById('inp-name').value.trim();
  const gender = document.querySelector('input[name="gender"]:checked')?.value ?? '';
  const age    = parseInt(document.getElementById('inp-age').value, 10);

  if (!name)           return alert(t.alertName);
  if (!gender)         return alert(t.alertGender);
  if (!age || age < 1) return alert(t.alertAge);

  participant = { name, gender, age };

  const conditions = ['8hz', '40hz', 'pink_noise'];
  condition    = conditions[Math.floor(Math.random() * 3)];
  presentation = 'auditory'; // 임시 테스트: 청각만

  runGame();
});

document.getElementById('btn-retry').addEventListener('click', () => {
  attemptNo++;
  runGame();
});

document.getElementById('btn-restart').addEventListener('click', () => {
  attemptNo = 1;
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-age').value  = '';
  document.querySelectorAll('input[name="gender"]').forEach(r => r.checked = false);
  showScreen($start);
  loadParticipantCount();
});

/* ════════════════════════════════════════
   초기화
════════════════════════════════════════ */
applyLang();
loadParticipantCount();

  ].join(';');

    </div>
