<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digit Span Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d1a;
      --panel:   #13132b;
      --accent:  #5e81f4;
      --accent2: #f45e81;
      --text:    #e8e8f0;
      --muted:   #6b6b90;
      --success: #4ade80;
      --fail:    #f45e81;
      --pink:    #f4a45e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .btn {
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .06em;
      transition: transform .1s, opacity .15s;
    }
    .btn:active { transform: scale(.95); }
    .btn:disabled { opacity: .4; cursor: default; }
    .copyright {
      margin-top: 2rem;
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .04em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.2rem;
      padding: .9rem 3.5rem;
      box-shadow: 0 8px 32px rgba(94,129,244,.35);
    }

    /* ══════════════════════════════
       언어 선택
    ══════════════════════════════ */
    .lang-switcher {
      display: flex;
      gap: .4rem;
      align-items: center;
      margin-bottom: 1.2rem;
    }
    .lang-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 50px;
      color: var(--text);
      font-size: .8rem;
      font-weight: 700;
      padding: .3rem .9rem;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .06em;
    }
    .lang-btn:hover { background: rgba(255,255,255,.14); }
    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 3px 12px rgba(94,129,244,.4);
    }

    /* ══════════════════════════════
       연구 안내 카드
    ══════════════════════════════ */
    .research-info {
      background: rgba(94,129,244,.06);
      border: 1px solid rgba(94,129,244,.18);
      border-radius: 16px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1.4rem;
      text-align: left;
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .research-info p { margin-bottom: .7rem; }
    .research-info p:last-child { margin-bottom: 0; }
    .research-info .info-highlight {
      color: var(--text);
      font-weight: 600;
    }

    /* ══════════════════════════════
       시작 / 참가자 입력 화면
    ══════════════════════════════ */
    #screen-start {
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn .5s ease;
    }
    #screen-start h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: .12em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .4rem;
    }
    #screen-start .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 1.2rem;
    }
    .participant-count {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(94,129,244,.08);
      border: 1px solid rgba(94,129,244,.2);
      border-radius: 50px;
      padding: .35rem 1.1rem;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 2rem;
      min-height: 1.8rem;
    }
    .participant-count .count-num {
      font-size: 1rem;
      font-weight: 900;
      color: var(--accent);
    }

    .form-card {
      background: var(--panel);
      border: 1px solid rgba(94,129,244,.18);
      border-radius: 20px;
      padding: 1.8rem;
      margin-bottom: 1.6rem;
      text-align: left;
    }
    .field { margin-bottom: 1.3rem; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }
    .field input[type="text"],
    .field input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(94,129,244,.25);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: .6rem 1rem;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--muted); }

    /* 성별 라디오 */
    .gender-row { display: flex; gap: .5rem; }
    .gender-row input[type="radio"] { display: none; }
    .gender-row label {
      flex: 1;
      text-align: center;
      padding: .5rem .2rem;
      border-radius: 10px;
      border: 1px solid rgba(94,129,244,.25);
      cursor: pointer;
      font-size: .92rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .15s;
    }
    .gender-row input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(94,129,244,.3);
    }

    /* ══════════════════════════════
       게임 화면
    ══════════════════════════════ */
    #screen-game {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeIn .4s ease;
    }

    #history-bar {
      display: flex;
      gap: .45rem;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 26px;
    }
    .hist-chip {
      font-size: .72rem;
      font-weight: 700;
      padding: .18rem .65rem;
      border-radius: 50px;
      letter-spacing: .05em;
    }
    .hist-chip.ok { background: rgba(74,222,128,.15); color: var(--success); border: 1px solid rgba(74,222,128,.3); }
    .hist-chip.ng { background: rgba(244,94,129,.15); color: var(--fail);    border: 1px solid rgba(244,94,129,.3); }

    #level-badge {
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(94,129,244,.1);
      border: 1px solid rgba(94,129,244,.28);
      border-radius: 50px;
      padding: .35rem 1.3rem;
    }

    #digit-card {
      width: clamp(150px, 26vw, 210px);
      height: clamp(195px, 34vw, 270px);
      background: var(--panel);
      border-radius: 22px;
      border: 2px solid rgba(94,129,244,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(5rem, 13vw, 8.5rem);
      font-weight: 900;
      color: var(--text);
      box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
      transition: border-color .12s, box-shadow .12s, background .12s;
      user-select: none;
    }
    #digit-card.show {
      border-color: var(--accent);
      box-shadow: 0 20px 60px rgba(94,129,244,.32), inset 0 1px 0 rgba(255,255,255,.08);
      background: linear-gradient(160deg, #1a1a3a, #13132b);
    }
    #digit-card.blank { border-color: rgba(94,129,244,.07); }


    #status-msg {
      font-size: .92rem;
      color: var(--muted);
      letter-spacing: .05em;
      min-height: 1.4rem;
      text-align: center;
    }
    #status-msg.ok   { color: var(--success); font-weight: 700; font-size: 1.05rem; }
    #status-msg.fail { color: var(--fail);    font-weight: 700; font-size: 1.05rem; }

    /* 입력 칸 */
    #input-area {
      display: flex;
      gap: .55rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .digit-input {
      width: clamp(42px, 8.5vw, 56px);
      height: clamp(54px, 10.5vw, 70px);
      border-radius: 12px;
      border: 2px solid rgba(94,129,244,.28);
      background: var(--panel);
      color: var(--text);
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 900;
      text-align: center;
      caret-color: transparent;
      outline: none;
      transition: border-color .12s, box-shadow .12s, background .12s;
    }
    .digit-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(94,129,244,.2); }
    .digit-input.correct { border-color: var(--success); background: rgba(74,222,128,.1); color: var(--success); }
    .digit-input.wrong   { border-color: var(--fail);    background: rgba(244,94,129,.1); color: var(--fail); }
    .btn-confirm {
      font-size: 1.1rem;
      padding: .8rem 3rem;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 24px rgba(94,129,244,.35);
      transition: opacity .2s, transform .1s;
    }
    .btn-confirm:disabled {
      opacity: .25;
      cursor: default;
      box-shadow: none;
    }

    /* ══════════════════════════════
       결과 화면
    ══════════════════════════════ */
    #screen-result {
      text-align: center;
      width: 100%;
      max-width: 480px;
      animation: fadeIn .5s ease;
    }
    #screen-result h2 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      letter-spacing: .1em;
      margin-bottom: .2rem;
    }
    .goodbye {
      color: var(--muted);
      font-size: 1rem;
      letter-spacing: .06em;
      margin-bottom: 1.4rem;
    }
    .result-meta {
      display: flex;
      justify-content: center;
      gap: .8rem;
      flex-wrap: wrap;
      margin-bottom: 1.6rem;
    }
    .meta-chip {
      font-size: .78rem;
      font-weight: 700;
      padding: .28rem .9rem;
      border-radius: 50px;
      letter-spacing: .06em;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--muted);
    }

    .best-label { color: var(--muted); font-size: .82rem; margin-bottom: .2rem; }
    .best-value {
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.8rem;
    }

    #result-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.8rem;
      font-size: .88rem;
    }
    #result-table th {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .35rem .6rem;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    #result-table td {
      padding: .45rem .6rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    #result-table td.ok { color: var(--success); font-weight: 700; }
    #result-table td.ng { color: var(--fail);    font-weight: 700; }

    /* ══════════════════════════════
       랭킹 섹션
    ══════════════════════════════ */
    .rank-section {
      background: rgba(94,129,244,.06);
      border: 1px solid rgba(94,129,244,.15);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.4rem;
    }
    .rank-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .rank-info {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: .8rem;
    }
    .rank-percentile {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--accent);
    }
    .rank-detail {
      font-size: .85rem;
      color: var(--muted);
      align-self: center;
    }
    #rank-chart {
      display: block;
      margin: 0 auto;
      max-width: 100%;
    }

    .save-status {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: 1.2rem;
      min-height: 1.1rem;
    }
    .save-status.saved { color: var(--success); }
    .save-status.error { color: var(--fail); }
    .retry-prompt {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: .9rem;
      letter-spacing: .04em;
    }
    .retry-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-retry {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.1rem;
      padding: .8rem 2.5rem;
      box-shadow: 0 6px 24px rgba(94,129,244,.35);
    }
    .btn-newuser {
      background: rgba(255,255,255,.07);
      color: var(--muted);
      font-size: 1rem;
      padding: .8rem 2rem;
      border: 1px solid rgba(255,255,255,.1);
    }

    /* ══════════════════════════════
       볼륨 테스트
    ══════════════════════════════ */
    .volume-test-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .volume-test-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      color: var(--muted);
      font-size: .9rem;
      padding: .55rem 1.4rem;
      transition: all .2s;
    }
    .volume-test-btn:hover {
      background: rgba(255,255,255,.12);
    }
    .volume-test-btn.playing {
      background: rgba(74,222,128,.12);
      border-color: var(--success);
      color: var(--success);
      box-shadow: 0 0 16px rgba(74,222,128,.2);
    }
    .headphone-icon { flex-shrink: 0; }
    .volume-indicator {
      font-size: .75rem;
      color: var(--muted);
      min-height: 1rem;
      letter-spacing: .04em;
    }

    /* ══════════════════════════════
       시도 카운터
    ══════════════════════════════ */
    .trial-counter {
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .15em;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50px;
      padding: .25rem 1rem;
      margin-bottom: 0;
    }

    /* ══════════════════════════════
       세션 요약 화면
    ══════════════════════════════ */
    #screen-summary {
      text-align: center;
      width: 100%;
      max-width: 480px;
      animation: fadeIn .5s ease;
    }
    #screen-summary h2 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      letter-spacing: .1em;
      margin-bottom: .2rem;
    }
    .summary-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.8rem;
    }
    .summary-stat { text-align: center; }
    .summary-stat-val {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .summary-stat-lbl {
      font-size: .78rem;
      color: var(--muted);
      letter-spacing: .06em;
    }
    #summary-chart {
      display: block;
      margin: 0 auto 1rem;
      max-width: 100%;
    }

    /* ══════════════════════════════
       파일럿 태그
    ══════════════════════════════ */
    .pilot-tag {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted);
      background: rgba(255,255,255,.04);
      border: 1px dashed rgba(255,255,255,.15);
      border-radius: 4px;
      padding: .3rem .9rem;
    }

    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ══ 시작 / 참가자 정보 입력 화면 ══ -->
<div id="screen-start">
  <div class="lang-switcher">
    <span class="pilot-tag">시험 운영 중</span>
    <span style="flex:1"></span>
    <button class="lang-btn active" id="lang-ko">한국어</button>
    <button class="lang-btn"        id="lang-en">English</button>
    <button class="lang-btn"        id="lang-zh">中文</button>
  </div>

  <h1>DIGIT SPAN TEST</h1>
  <p class="subtitle" id="txt-subtitle"></p>
  <div class="research-info" id="txt-research-info"></div>

  <div class="volume-test-area">
    <button class="btn volume-test-btn" id="btn-volume-test">
      <svg class="headphone-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
      </svg>
      <span id="volume-test-label"></span>
    </button>
    <div class="volume-indicator" id="volume-indicator"></div>
  </div>

  <div id="participant-count" class="participant-count"></div>

  <div class="form-card">
    <div class="field">
      <label id="lbl-gender"></label>
      <div class="gender-row">
        <input type="radio" name="gender" id="g-male"   value="남성" />
        <label for="g-male"   id="lbl-g-male"></label>
        <input type="radio" name="gender" id="g-female" value="여성" />
        <label for="g-female" id="lbl-g-female"></label>
        <input type="radio" name="gender" id="g-other"  value="기타" />
        <label for="g-other"  id="lbl-g-other"></label>
      </div>
    </div>
    <div class="field">
      <label id="lbl-birth-year"></label>
      <input type="number" id="inp-birth-year" min="1900" max="2026" autocomplete="off" />
    </div>
  </div>

  <button class="btn btn-primary" id="btn-start">START</button>
  <p class="copyright">© 2026 Tae Kim &amp; Seungyeong Yu.<br>All rights reserved.</p>
</div>

<!-- ══ 게임 화면 ══ -->
<div id="screen-game" class="hidden">
  <div id="trial-counter" class="trial-counter">1 / 10</div>
  <div id="history-bar"></div>
  <div id="level-badge">3 DIGITS</div>
  <div id="digit-card" class="blank"></div>
  <div id="status-msg"></div>
  <div id="input-area" class="hidden"></div>
  <button id="btn-confirm" class="btn btn-confirm hidden" disabled></button>
</div>

<!-- ══ 결과 화면 ══ -->
<div id="screen-result" class="hidden">
  <h2>YOUR RESULT</h2>
  <p class="goodbye" id="txt-goodbye"></p>

  <div class="result-meta">
    <span class="meta-chip" id="res-name"></span>
  </div>

  <div class="best-label" id="txt-best-label"></div>
  <div class="best-value" id="result-best">–</div>

  <table id="result-table">
    <thead>
      <tr>
        <th id="th-level"></th>
        <th id="th-result"></th>
        <th id="th-entered"></th>
        <th id="th-answer"></th>
      </tr>
    </thead>
    <tbody id="result-tbody"></tbody>
  </table>

  <p class="save-status hidden" id="save-status"></p>
  <p class="retry-prompt" id="txt-retry-prompt"></p>
  <div class="retry-buttons">
    <button class="btn btn-retry"   id="btn-retry"></button>
    <button class="btn btn-newuser" id="btn-restart"></button>
  </div>
</div>

<!-- ══ 세션 요약 화면 ══ -->
<div id="screen-summary" class="hidden">
  <h2 id="summary-title">SESSION COMPLETE</h2>
  <p class="goodbye" id="summary-subtitle"></p>

  <div class="result-meta">
    <span class="meta-chip" id="summary-name"></span>
  </div>

  <div class="summary-stats">
    <div class="summary-stat">
      <div class="summary-stat-val" id="summary-best">–</div>
      <div class="summary-stat-lbl" id="summary-best-lbl">최고 기록</div>
    </div>
    <div class="summary-stat">
      <div class="summary-stat-val" id="summary-avg">–</div>
      <div class="summary-stat-lbl" id="summary-avg-lbl">평균</div>
    </div>
  </div>

  <canvas id="summary-chart" width="360" height="220"></canvas>

  <div id="summary-rank-section" class="rank-section hidden">
    <div class="rank-label" id="summary-rank-label"></div>
    <div class="rank-info">
      <span class="rank-percentile" id="summary-rank-percentile"></span>
      <span class="rank-detail" id="summary-rank-detail"></span>
    </div>
    <canvas id="summary-rank-chart" width="320" height="130"></canvas>
  </div>

  <div class="retry-buttons" style="margin-top:1.5rem;">
    <button class="btn btn-newuser" id="btn-summary-restart"></button>
  </div>
  <p class="copyright">© 2026 Tae Kim &amp; Seungyeong Yu.<br>All rights reserved.</p>
</div>

<script>

/* ════════════════════════════════════════
   오디오 유틸 (Web Audio API)
════════════════════════════════════════ */
const STIMULUS_VOL = { '40hz': 1, 'pink_noise': 1 };
const STIMULUS_SRC = { '40hz': '40Hz_T.mp3', 'pink_noise': 'pink_T.wav' };

let audioCtx     = null;
let audioBuffers = {};
let _activeNode  = null;
let _masterGain  = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function getMasterGain() {
  const ctx = getAudioCtx();
  if (!_masterGain) {
    _masterGain = ctx.createGain();
    _masterGain.gain.value = 0;
    _masterGain.connect(ctx.destination);
  }
  return _masterGain;
}

function unlockAudio() {
  const ctx = getAudioCtx();
  getMasterGain();
  const silentBuf = ctx.createBuffer(1, 1, 22050);
  const silentSrc = ctx.createBufferSource();
  silentSrc.buffer = silentBuf;
  silentSrc.connect(getMasterGain());
  silentSrc.start();
  loadAudioBuffers();
}

async function loadAudioBuffers() {
  const ctx = getAudioCtx();
  await Promise.all(Object.entries(STIMULUS_SRC).map(async ([key, url]) => {
    if (audioBuffers[key]) return;
    try {
      const res = await fetch(url);
      const raw = await res.arrayBuffer();
      audioBuffers[key] = await ctx.decodeAudioData(raw);
    } catch (e) { console.warn('Buffer load failed:', key, e); }
  }));
}

function playStimulus(durationSec) {
  if (_activeNode) { try { _activeNode.stop(); } catch (_) {} _activeNode = null; }
  const ctx = getAudioCtx();
  const buf = audioBuffers[condition];
  if (!buf) return;
  const vol  = STIMULUS_VOL[condition] ?? 0.3;
  const gain = getMasterGain();
  gain.gain.cancelScheduledValues(0);
  gain.gain.value = vol;
  const source = ctx.createBufferSource();
  source.buffer = buf;
  source.connect(gain);
  const t0 = ctx.currentTime + 0.01;
  source.start(t0);
  source.stop(t0 + durationSec);
  _activeNode = source;
}

/* ════════════════════════════════════════
   유틸
════════════════════════════════════════ */
const sleep = ms => new Promise(r => setTimeout(r, ms));

function randDigitSeq(len) {
  const digits = [1,2,3,4,5,6,7,8,9];
  const seq = [];
  for (let i = 0; i < len; i++) {
    let d;
    do { d = digits[Math.floor(Math.random() * digits.length)]; }
    while (d === seq[seq.length - 1]);
    seq.push(d);
  }
  return seq;
}

/* ════════════════════════════════════════

════════════════════════════════════════ */
function showScreen(el) {
  [$start, $game, $result, $summary].forEach(s => s.classList.add('hidden'));
  el.classList.remove('hidden');
}

/* ════════════════════════════════════════
   기록 바
════════════════════════════════════════ */
function refreshHistBar() {
  $histBar.innerHTML = gameResults.map(r =>
    `<span class="hist-chip ${r.success ? 'ok' : 'ng'}">${r.level}-D ${r.success ? '✓' : '✗'}</span>`
  ).join('');
}

/* ════════════════════════════════════════
   시퀀스 재생
   0–0.5s: 소리자극 + 숫자 표시
   0–1.0s: 숫자 표시
   1.0–1.2s: pause
════════════════════════════════════════ */
async function playSequence(seq) {
  for (let i = 0; i < seq.length; i++) {
    $card.textContent = seq[i];
    $card.className   = 'show';
    playStimulus(0.5);
    await sleep(1000);
    $card.textContent = '';
    $card.className   = 'blank';
    await sleep(200);
  }
}

/* ════════════════════════════════════════
   입력 대기 & 자동 판정
════════════════════════════════════════ */
function waitForInput(seq) {
  const n = seq.length;
  const t = T[lang];
  $inputArea.innerHTML = '';
  $inputArea.classList.remove('hidden');

  $btnConfirm.classList.remove('hidden');
  $btnConfirm.disabled = true;

  const inputs = Array.from({ length: n }, () => {
    const inp = document.createElement('input');
    inp.type      = 'text';
    inp.inputMode = 'numeric';
    inp.maxLength = 1;
    inp.className = 'digit-input';
    inp.setAttribute('autocomplete', 'off');
    $inputArea.appendChild(inp);
    return inp;
  });

  requestAnimationFrame(() => inputs[0].focus());

  return new Promise(resolve => {
    function lockAll() { inputs.forEach(i => { i.readOnly = true; i.blur(); }); }

    function updateConfirmBtn() {
      $btnConfirm.disabled = inputs.some(i => i.value === '');
    }

    function submit() {
      if (inputs.some(i => i.value === '')) return;
      lockAll();
      $btnConfirm.disabled = true;
      $btnConfirm.classList.add('hidden');
      const entered = inputs.map(i => parseInt(i.value, 10));
      const correct = seq.every((d, i) => d === entered[i]);
      inputs.forEach((inp, i) => inp.classList.add(seq[i] === entered[i] ? 'correct' : 'wrong'));
      $status.textContent = correct ? t.correct : t.wrong;
      $status.className   = correct ? 'ok' : 'fail';
      setTimeout(() => resolve({ correct, entered }), 900);
    }

    $btnConfirm.onclick = submit;

    inputs.forEach((inp, idx) => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace') {
          if (inp.value === '' && idx > 0) { inputs[idx-1].value = ''; inputs[idx-1].focus(); }
          else inp.value = '';
          e.preventDefault();
          updateConfirmBtn();
          return;
        }
        if (e.key === 'Enter') { submit(); return; }
        if (e.key.length === 1 && !/[0-9]/.test(e.key)) e.preventDefault();
      });
      inp.addEventListener('input', () => {
        inp.value = inp.value.replace(/[^0-9]/g, '').slice(-1);
        if (inp.value !== '' && idx < n - 1) inputs[idx + 1].focus();
        updateConfirmBtn();
      });
    });
  });
}

/* ════════════════════════════════════════
   레벨 실행
════════════════════════════════════════ */
async function runLevel(level) {
  const seq = randDigitSeq(level);
  const t   = T[lang];
  $badge.textContent  = `${level} DIGITS`;
  $card.textContent   = '';
  $card.className     = 'blank';
  $status.textContent = t.ready;
  $status.className   = '';
  $inputArea.classList.add('hidden');
  $inputArea.innerHTML = '';
  $btnConfirm.classList.add('hidden');
  $btnConfirm.disabled = true;

  await sleep(1200);

  $status.textContent = '';
  await playSequence(seq);

  $status.textContent = t.inputPrompt;
  $status.className   = '';

  const { correct, entered } = await waitForInput(seq);
  gameResults.push({ level, success: correct, seq, entered });
  refreshHistBar();
  return correct;
}

/* ════════════════════════════════════════
   서버에 결과 저장
════════════════════════════════════════ */
async function saveToServer() {
  const t = T[lang];
  try {
    $saveStatus.textContent = t.saving;
    $saveStatus.className   = 'save-status';
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:         '',
        gender:       participant.gender,
        age:          participant.birthYear,
        lang,
        condition,
        duration_sec: Math.round((Date.now() - gameStartTime) / 1000),
        attempt_no:   attemptNo,
        results:      gameResults
      })
    });
    if (res.ok) {
      const { id } = await res.json();
      $saveStatus.textContent = t.saved(id);
      $saveStatus.className   = 'save-status saved';
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    console.warn('Save failed:', e);
    $saveStatus.textContent = t.saveError;
    $saveStatus.className   = 'save-status error';
  }
}

/* ════════════════════════════════════════
   결과 화면
════════════════════════════════════════ */
async function showResult() {
  const t = T[lang];
  const successes = gameResults.filter(r => r.success);
  const best = successes.length > 0 ? Math.max(...successes.map(r => r.level)) : 0;

  // 세션 결과 기록
  sessionResults.push({ trial: sessionTrial, best, condition, results: [...gameResults] });

  $resBest.textContent = best > 0 ? `${best}-Digit` : '–';

  $resName.textContent =
    `${participant.gender} · ${t.metaBirthYear(participant.birthYear)}` +
    ` · ${t.trialCounter(sessionTrial, MAX_TRIALS)}`;

  $resTbody.innerHTML = gameResults.map(r => {
    const cls = r.success ? 'ok' : 'ng';
    const txt = r.success ? t.resultOk : t.resultNg;
    return `<tr>
      <td>${r.level}-Digit</td>
      <td class="${cls}">${txt}</td>
      <td>${r.entered.join(' ')}</td>
      <td style="color:var(--muted)">${r.seq.join(' ')}</td>
    </tr>`;
  }).join('');

  // 10회차 완료 시 버튼 변경
  const $btnRetry = document.getElementById('btn-retry');
  if (sessionTrial >= MAX_TRIALS) {
    document.getElementById('txt-retry-prompt').textContent = t.allTrialsDone;
    $btnRetry.textContent = t.btnViewSummary;
    $btnRetry.onclick = () => showSessionSummary();
  } else {
    document.getElementById('txt-retry-prompt').textContent = t.retryPrompt;
    $btnRetry.textContent = t.btnRetry;
    $btnRetry.onclick = null;  // 기본 이벤트 리스너 사용
  }

  showScreen($result);
  await saveToServer();
}

/* ════════════════════════════════════════
   게임 루프
════════════════════════════════════════ */
async function runGame() {
  // 볼륨 테스트 정지
  if (_volTestPlaying) {
    if (_volTestNode) { try { _volTestNode.stop(); } catch (_) {} _volTestNode = null; }
    document.getElementById('btn-volume-test').classList.remove('playing');
    document.getElementById('volume-test-label').textContent = T[lang].volumeTest;
    _volTestPlaying = false;
  }
  gameResults   = [];
  currentLevel  = 3;
  gameStartTime = Date.now();
  $histBar.innerHTML = '';
  document.getElementById('trial-counter').textContent = T[lang].trialCounter(sessionTrial, MAX_TRIALS);
  showScreen($game);

  while (true) {
    const ok = await runLevel(currentLevel);
    if (!ok) break;
    currentLevel++;
  }

  await sleep(400);
  await showResult();
}

/* ════════════════════════════════════════
   랭킹 & 정규분포 시각화
════════════════════════════════════════ */
async function loadSummaryRanking(myScore) {
  const rankSection = document.getElementById('summary-rank-section');
  if (myScore <= 0) { rankSection.classList.add('hidden'); return; }

  try {
    const res = await fetch(`/api/rank?score=${myScore}`);
    const data = await res.json();
    if (data.total < 2) { rankSection.classList.add('hidden'); return; }

    const t = T[lang];
    const topPct = Math.max(1, 100 - data.percentile);

    document.getElementById('summary-rank-label').textContent       = t.rankLabel;
    document.getElementById('summary-rank-percentile').textContent   = t.rankTop(topPct);
    document.getElementById('summary-rank-detail').textContent       = t.rankOf(data.rank, data.total);
    rankSection.classList.remove('hidden');

    drawNormalDistChart(data.mean, data.std, myScore);
  } catch (e) {
    console.warn('Rank load failed:', e);
    rankSection.classList.add('hidden');
  }
}

function drawNormalDistChart(mean, std, myScore) {
  const canvas = document.getElementById('summary-rank-chart');
  const dpr    = window.devicePixelRatio || 1;
  const W = 320, H = 130;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad  = { top: 10, right: 15, bottom: 25, left: 15 };
  const cW   = W - pad.left - pad.right;
  const cH   = H - pad.top - pad.bottom;

  // x 범위: mean ± 3.5 std
  const xMin = Math.max(0, mean - 3.5 * std);
  const xMax = mean + 3.5 * std;

  function normPdf(x) {
    const z = (x - mean) / std;
    return Math.exp(-0.5 * z * z) / (std * Math.sqrt(2 * Math.PI));
  }

  function xToCanvas(x) { return pad.left + ((x - xMin) / (xMax - xMin)) * cW; }

  // 곡선의 최대 높이
  const peakY = normPdf(mean);

  function yToCanvas(y) { return pad.top + cH - (y / peakY) * cH * 0.9; }

  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  // 곡선 아래 채우기
  ctx.beginPath();
  const steps = 100;
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (i / steps) * (xMax - xMin);
    const cx = xToCanvas(x);
    const cy = yToCanvas(normPdf(x));
    if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
  }
  ctx.lineTo(xToCanvas(xMax), yToCanvas(0));
  ctx.lineTo(xToCanvas(xMin), yToCanvas(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(94,129,244,.1)';
  ctx.fill();

  // 곡선
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const x = xMin + (i / steps) * (xMax - xMin);
    const cx = xToCanvas(x);
    const cy = yToCanvas(normPdf(x));
    if (i === 0) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
  }
  ctx.strokeStyle = 'rgba(94,129,244,.5)';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // 본인 위치 - 수직선
  const myX = xToCanvas(myScore);
  const myY = yToCanvas(normPdf(myScore));
  ctx.beginPath();
  ctx.moveTo(myX, yToCanvas(0));
  ctx.lineTo(myX, myY);
  ctx.strokeStyle = '#f45e81';
  ctx.lineWidth   = 2;
  ctx.stroke();

  // 본인 위치 - 점
  ctx.beginPath();
  ctx.arc(myX, myY, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#f45e81';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // 라벨
  ctx.fillStyle = '#f45e81';
  ctx.font      = 'bold 11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`${myScore}`, myX, myY - 10);

  // X축 라벨 (정수 눈금)
  ctx.fillStyle = '#6b6b90';
  ctx.font      = '10px system-ui';
  ctx.textAlign = 'center';
  const minTick = Math.max(1, Math.ceil(xMin));
  const maxTick = Math.floor(xMax);
  for (let v = minTick; v <= maxTick; v++) {
    ctx.fillText(v, xToCanvas(v), H - pad.bottom + 14);
  }
}

async function showSessionSummary() {
  const t = T[lang];
  const bests = sessionResults.map(r => r.best);
  const best  = Math.max(...bests);
  const avg   = (bests.reduce((a, b) => a + b, 0) / bests.length).toFixed(1);

  document.getElementById('summary-title').textContent    = t.sessionComplete;
  document.getElementById('summary-subtitle').textContent = t.summarySubtitle;
  document.getElementById('summary-name').textContent =
    `${participant.gender} · ${t.metaBirthYear(participant.birthYear)}`;
  document.getElementById('summary-best').textContent     = `${best}-Digit`;
  document.getElementById('summary-best-lbl').textContent = t.summaryBestLbl;
  document.getElementById('summary-avg').textContent      = avg;
  document.getElementById('summary-avg-lbl').textContent  = t.summaryAvgLbl;
  document.getElementById('btn-summary-restart').textContent = t.btnNewUser;

  drawSummaryChart(bests, t);
  showScreen($summary);

  // 랭킹 로드 (최고 기록 기준)
  await loadSummaryRanking(best);
}

function drawSummaryChart(bests, t) {
  const canvas = document.getElementById('summary-chart');
  const dpr    = window.devicePixelRatio || 1;
  const W      = 360, H = 220;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad    = { top: 20, right: 15, bottom: 35, left: 35 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const maxVal = Math.max(...bests, 5);
  const barW   = chartW / bests.length * 0.6;
  const gap    = chartW / bests.length;

  // 배경
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);

  // 그리드 라인
  ctx.strokeStyle = 'rgba(255,255,255,.06)';
  ctx.lineWidth   = 1;
  for (let v = 0; v <= maxVal; v++) {
    const y = pad.top + chartH - (v / maxVal) * chartH;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
    // Y축 라벨
    ctx.fillStyle = '#6b6b90';
    ctx.font = '11px system-ui';
    ctx.textAlign = 'right';
    ctx.fillText(v, pad.left - 6, y + 4);
  }

  // 바 그리기
  bests.forEach((val, i) => {
    const x = pad.left + i * gap + (gap - barW) / 2;
    const barH = (val / maxVal) * chartH;
    const y = pad.top + chartH - barH;

    // 그라디언트
    const grad = ctx.createLinearGradient(x, y, x, y + barH);
    grad.addColorStop(0, '#5e81f4');
    grad.addColorStop(1, '#f45e81');
    ctx.fillStyle = grad;

    // 둥근 바
    const r = Math.min(4, barW / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + barW - r, y);
    ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
    ctx.lineTo(x + barW, y + barH);
    ctx.lineTo(x, y + barH);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.fill();

    // 바 위에 값 표시
    ctx.fillStyle = '#e8e8f0';
    ctx.font = 'bold 12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(val, x + barW / 2, y - 5);

    // X축 라벨
    ctx.fillStyle = '#6b6b90';
    ctx.font = '11px system-ui';
    ctx.fillText(i + 1, x + barW / 2, H - pad.bottom + 16);
  });

  // X축 제목
  ctx.fillStyle = '#6b6b90';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(t.trialLabel, W / 2, H - 2);
}

/* ════════════════════════════════════════
   볼륨 테스트 토글
════════════════════════════════════════ */
let _volTestNode   = null;
let _volTestPlaying = false;

document.getElementById('btn-volume-test').addEventListener('click', () => {
  const btn  = document.getElementById('btn-volume-test');
  const lbl  = document.getElementById('volume-test-label');
  const t    = T[lang];

  if (_volTestPlaying) {
    // 정지
    if (_volTestNode) { try { _volTestNode.stop(); } catch (_) {} _volTestNode = null; }
    btn.classList.remove('playing');
    lbl.textContent = t.volumeTest;
    _volTestPlaying = false;
    return;
  }

  // 재생 시작 — 오디오 컨텍스트 초기화
  const ctx  = getAudioCtx();
  getMasterGain();

  // 40Hz 샘플을 볼륨 테스트용으로 사용
  const testKey = '40hz';
  const testUrl = STIMULUS_SRC[testKey];

  async function startPlayback() {
    if (!audioBuffers[testKey]) {
      try {
        const res = await fetch(testUrl);
        const raw = await res.arrayBuffer();
        audioBuffers[testKey] = await ctx.decodeAudioData(raw);
      } catch (e) { console.warn('Volume test load failed:', e); return; }
    }

    const buf  = audioBuffers[testKey];
    const gain = getMasterGain();
    gain.gain.cancelScheduledValues(0);
    gain.gain.value = 1;

    _volTestPlaying = true;
    btn.classList.add('playing');
    lbl.textContent = t.volumePlaying;

    function playLoop() {
      if (!_volTestPlaying) return;
      const src = ctx.createBufferSource();
      src.buffer = buf;
      src.connect(gain);
      const t0 = ctx.currentTime + 0.01;
      src.start(t0);
      src.stop(t0 + 0.5);
      _volTestNode = src;
      src.onended = () => {
        if (!_volTestPlaying) return;
        setTimeout(playLoop, 500);  // 0.5초 pause
      };
    }
    playLoop();
  }

  startPlayback();
});
